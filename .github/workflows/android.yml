name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup EAS
        run: npm install -g eas-cli

      - name: Install Dependencies
        run: npm install

      - name: Build APK (Simulation)
        run: |
          mkdir -p build
          echo "This is a simulated APK build artifact" > build/app-release.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app-release.apk