name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: |
          npm install
          npx expo install --fix

      - name: Create placeholder assets
        run: |
          mkdir -p assets/images
          BASE64_PNG="iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg=="
          [ -f assets/images/icon.png ] || echo $BASE64_PNG | base64 -d > assets/images/icon.png
          [ -f assets/images/adaptive-icon.png ] || echo $BASE64_PNG | base64 -d > assets/images/adaptive-icon.png
          [ -f assets/images/splash.png ] || echo $BASE64_PNG | base64 -d > assets/images/splash.png
          [ -f assets/images/favicon.png ] || echo $BASE64_PNG | base64 -d > assets/images/favicon.png

      - name: Prebuild Expo app
        run: npx expo prebuild --platform android --clean --no-install

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/app-release.apk
